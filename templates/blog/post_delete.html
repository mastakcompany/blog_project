{% extends "base.html" %}

{% block title %}Удаление статьи — {{ block.super }}{% endblock %}

{% block content %}
  <div class="row justify-content-center">
    <div class="col-lg-8">
      <div class="bg-white p-5 rounded border shadow-sm">
        <!-- Ссылка на возврат назад -->
        <a href="{% url 'blog:post_detail' post.slug %}" class="text-decoration-none text-muted small">&larr; Вернуться к
          статье</a>

        <header class="mt-3 mb-4">
          <h1 class="display-5 fw-bold text-danger">Удаление статьи</h1>
        </header>

        <hr class="my-4">

        <div class="alert alert-danger border-0 shadow-sm" role="alert">
          Вы действительно хотите удалить статью «<strong>{{ post.title }}</strong>»?
          Это действие необратимо.
        </div>

        <form method="post">
          {% csrf_token %}

          <!-- Панель управления -->
          <div class="bg-light p-4 rounded border d-flex justify-content-between align-items-center">
            <a href="{% url 'blog:post_detail' post.slug %}" class="btn btn-outline-dark">Отмена</a>
            <button type="submit" class="btn btn-danger">Удалить статью</button>
          </div>
        </form>
      </div>
    </div>
  </div>
{% endblock %}
