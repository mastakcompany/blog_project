{% extends "base.html" %}

{% block title %}Доступ запрещён — {{ block.super }}{% endblock %}

{% block content %}

      <div class="card border-0 shadow-sm text-center">
        <div class="card-body p-5">
          <div class="display-1 fw-bold text-danger mb-3">403</div>
          <h1 class="h3 fw-bold text-dark mb-3">Доступ запрещён</h1>

          <a href="{% url 'blog:index_page' %}" class="btn btn-primary btn-lg">

      </div>
    </div>
