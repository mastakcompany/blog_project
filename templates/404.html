{% extends "base.html" %}

{% block title %}Страница не найдена — {{ block.super }}{% endblock %}

{% block content %}
  <div class="row justify-content-center">
    <div class="col-lg-7">
      <div class="card border-0 shadow-sm text-center">
        <div class="card-body p-5">
          <div class="display-1 fw-bold text-primary mb-3">404</div>
          <h1 class="h3 fw-bold text-dark mb-3">Страница не найдена</h1>
          <p class="text-secondary fs-5 mb-4">
            Похоже, такой страницы не существует или она была перемещена.
            Проверьте адрес или вернитесь на главную.
          </p>
          <a href="{% url 'blog:index_page' %}" class="btn btn-primary btn-lg">
            &larr; На главную
          </a>
        </div>
      </div>
    </div>
  </div>
{% endblock %}
