{% extends "base.html" %}

{% block title %}Пароль изменён — {{ block.super }}{% endblock %}

{% block content %}
  <div class="row justify-content-center">
    <div class="col-lg-6">
      <div class="card border-0 shadow-sm text-center">
        <div class="card-body p-5">
          <div class="display-4 mb-3">✅</div>
          <h1 class="h3 fw-bold text-dark mb-3">Пароль успешно изменён</h1>
          <p class="text-secondary fs-5 mb-4">
            Ваш пароль обновлён. При следующем входе используйте новый пароль.
          </p>
          <div class="d-flex justify-content-center gap-2">
            <a href="{% url 'users:profile_detail' %}" class="btn btn-dark">Вернуться к профилю</a>
            <a href="{% url 'blog:index_page' %}" class="btn btn-outline-dark">На главную</a>
          </div>
        </div>
      </div>
    </div>
  </div>
{% endblock %}
